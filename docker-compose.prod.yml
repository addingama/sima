# SIMA — production stack
# Usage:
#   cp .env.production.example .env
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec app php artisan migrate --force
#
# Akses: http://localhost (port 80) — API /api/*, UI /*

name: sima-prod

services:
  app:
    image: ${SIMA_API_IMAGE:-sima-api:local}
    build:
      context: .
      target: production
    environment: &app_env
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-sima}
      DB_USERNAME: ${DB_USERNAME:-sima}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      FILESYSTEM_DISK: local
      FRONTEND_URL: ${FRONTEND_URL:-${APP_URL:-http://localhost}}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      SIMA_BACKUP_DIR: /var/www/html/storage/backups
    volumes:
      - app_storage:/var/www/html/storage
      - backup_data:/var/www/html/storage/backups
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep php-fpm || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${SIMA_HTTP_PORT:-80}:80"
    volumes:
      - app_storage:/var/www/html/storage:ro
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_started
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health | grep -q ok || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  frontend:
    image: ${SIMA_FRONTEND_IMAGE:-sima-frontend:local}
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sima}
      MYSQL_USER: ${DB_USERNAME:-sima}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      sh -c "redis-server
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
      --appendonly yes"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    image: ${SIMA_WORKER_IMAGE:-sima-worker:local}
    build:
      context: .
      target: worker
    environment:
      <<: *app_env
      RUN_MIGRATIONS: "false"
    volumes:
      - app_storage:/var/www/html/storage
      - backup_data:/var/www/html/storage/backups
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  app_storage:
  backup_data:
