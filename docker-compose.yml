# SIMA — stack development lokal
# Usage:
#   cp .env.example .env   (sesuaikan DB_* ke mysql service di bawah)
#   docker compose up -d --build
#   docker compose exec app composer install
#   docker compose exec app php artisan key:generate
#   docker compose exec app php artisan migrate --seed
# API: http://localhost:8080

services:
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: sima
      DB_USERNAME: sima
      DB_PASSWORD: sima_secret
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${SIMA_HTTP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: sima
      MYSQL_USER: sima
      MYSQL_PASSWORD: sima_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "${SIMA_MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${SIMA_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  queue:
    build:
      context: .
      target: dev
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: sima
      DB_USERNAME: sima
      DB_PASSWORD: sima_secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - app
      - redis
    restart: unless-stopped

  scheduler:
    build:
      context: .
      target: dev
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: sima
      DB_USERNAME: sima
      DB_PASSWORD: sima_secret
      REDIS_HOST: redis
    depends_on:
      - app
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
